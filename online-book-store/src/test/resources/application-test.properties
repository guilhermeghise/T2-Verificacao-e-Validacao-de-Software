#
# Profile used only by the automated test suite (unit tests that load a
# Spring context, integration tests and system tests).
# It replaces the real MySQL connection with an isolated, in-memory H2
# database that is created fresh and destroyed at the end of every test,
# so the test suite never depends on / interferes with a real database.
#
spring.datasource.url=jdbc:h2:mem:online_book_store_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

management.endpoints.web.exposure.exclude=info
